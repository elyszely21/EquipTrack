{% extends "dashboard/base.html" %}

{% block title %}Edit Profile{% endblock %}
{% block active_page %}profile{% endblock %}

{% block content %}

<div class="page-header">
    <h2><i class="bi bi-pencil-square me-2"></i>Edit Profile</h2>
    <a href="{% url 'profile' %}" class="btn btn-outline-secondary">
        <i class="bi bi-arrow-left me-2"></i>Back to Profile
    </a>
</div>

<form method="post" action="" data-disable-on-submit>
    {% csrf_token %}

    <div class="row">
        <div class="col-md-6 mb-4">
            <div class="content-card">
                <div class="card-header">
                    <h5 class="mb-0"><i class="bi bi-person me-2"></i>Personal Information</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="first_name" class="form-label">First Name</label>
                        <input type="text" name="first_name" id="first_name" class="form-control" value="{{ request.user.first_name }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="last_name" class="form-label">Last Name</label>
                        <input type="text" name="last_name" id="last_name" class="form-control" value="{{ request.user.last_name }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" name="email" id="email" class="form-control" value="{{ request.user.email }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="middle_name" class="form-label">Middle Name</label>
                        <input type="text" name="middle_name" id="middle_name" class="form-control" value="{{ profile.middle_name }}">
                    </div>
                    <div class="mb-3">
                        <label for="suffix" class="form-label">Suffix</label>
                        <input type="text" name="suffix" id="suffix" class="form-control" value="{{ profile.suffix }}">
                    </div>
                </div>
            </div>
        </div>

        <div class="col-md-6 mb-4">
            <div class="content-card">
                <div class="card-header">
                    <h5 class="mb-0"><i class="bi bi-briefcase me-2"></i>Employment Information</h5>
                </div>
                <div class="card-body">
                    <div class="mb-3">
                        <label for="contact_number" class="form-label">Contact Number</label>
                        <input type="text" name="contact_number" id="contact_number" class="form-control" value="{{ profile.contact_number }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="department" class="form-label">Department</label>
                        <input type="text" name="department" id="department" class="form-control" value="{{ profile.department }}">
                    </div>
                    <div class="mb-3">
                        <label for="position" class="form-label">Position</label>
                        <input type="text" name="position" id="position" class="form-control" value="{{ profile.position }}">
                    </div>
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" name="username" id="username" class="form-control" value="{{ request.user.username }}" disabled>
                        <div class="form-text">Username cannot be changed.</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="content-card">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-circle me-2"></i>Save Changes
                </button>
                <a href="{% url 'profile' %}" class="btn btn-outline-secondary">
                    <i class="bi bi-x-circle me-2"></i>Cancel
                </a>
            </div>
        </div>
    </div>
</form>

{% endblock %}
