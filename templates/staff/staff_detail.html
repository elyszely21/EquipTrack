{% extends "dashboard/base.html" %}

{% block title %}Staff Details{% endblock %}

{% block content %}

<div class="container mt-4">

<h2>Staff Details</h2>

<hr>

<p><strong>Full Name:</strong> {{ staff.user.get_full_name }}</p>

<p><strong>Username:</strong> {{ staff.user.username }}</p>

<p><strong>Email:</strong> {{ staff.user.email }}</p>

<p><strong>Department:</strong> {{ staff.department }}</p>

<a href="{% url 'staff_list' %}" class="btn btn-secondary">

Back

</a>

</div>

{% endblock %}
