{% extends "dashboard/base.html" %}

{% block title %}
{{ title }}
{% endblock %}

{% block content %}

<div class="container">

    <div class="card shadow">

        <div class="card-header">

            <h3>{{ title }}</h3>

        </div>

        <div class="card-body">

            <form method="POST">

                {% csrf_token %}

                {{ form.as_p }}

                <button class="btn btn-success">

                    Save

                </button>

                <a href="{% url 'equipment_list' %}"

                   class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
